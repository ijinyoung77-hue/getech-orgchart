<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GETech 조직도</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
.header{background:#534AB7;color:white;padding:12px 20px;display:flex;align-items:center;gap:10px}
.header h1{font-size:15px;font-weight:500}
.wrap{display:flex;height:calc(100vh - 48px)}
.sidebar{width:155px;min-width:155px;background:#fff;border-right:1px solid #e8e8e8;overflow-y:auto;padding:8px 0}
.sidebar-title{font-size:11px;color:#aaa;padding:8px 14px 6px;letter-spacing:0.05em}
.dept-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;font-size:13px;color:#555;border-left:2px solid transparent}
.dept-item:hover{background:#f5f3ff;color:#333}
.dept-item.active{background:#f5f3ff;color:#534AB7;border-left-color:#534AB7;font-weight:500}
.dept-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:16px}
.main-top{margin-bottom:12px}
.main-top h2{font-size:15px;font-weight:500}
.main-top p{font-size:12px;color:#aaa;margin-top:2px}
.row-list{display:flex;flex-direction:column;gap:5px}
.row{display:flex;align-items:center;gap:12px;padding:9px 14px;border:1px solid #eee;border-radius:8px;background:#fff}
.row:hover{background:#f9f8ff}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.name{font-size:13px;font-weight:500;min-width:65px}
.dept-tag{font-size:12px;color:#aaa;min-width:70px}
.status-wrap{display:flex;align-items:center;gap:4px;min-width:60px}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-txt{font-size:11px;color:#aaa}
.email{font-size:11px;color:#bbb;flex:1}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.loading{padding:40px;text-align:center;color:#aaa;font-size:13px}
.error{padding:40px;text-align:center;color:#e24b4a;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
    <rect x="7" y="3" width="14" height="8" rx="2" fill="white" opacity="0.9"/>
    <circle cx="14" cy="7" r="2.5" fill="#534AB7"/>
    <line x1="14" y1="11" x2="14" y2="15" stroke="white" stroke-width="1.5"/>
    <line x1="5" y1="15" x2="23" y2="15" stroke="white" stroke-width="1.5"/>
    <line x1="5" y1="15" x2="5" y2="18" stroke="white" stroke-width="1.5"/>
    <line x1="14" y1="15" x2="14" y2="18" stroke="white" stroke-width="1.5"/>
    <line x1="23" y1="15" x2="23" y2="18" stroke="white" stroke-width="1.5"/>
    <rect x="1" y="18" width="8" height="8" rx="2" fill="white" opacity="0.75"/>
    <rect x="10" y="18" width="8" height="8" rx="2" fill="white" opacity="0.75"/>
    <rect x="19" y="18" width="8" height="8" rx="2" fill="white" opacity="0.75"/>
  </svg>
  <h1>GETech 조직도</h1>
</div>

<div class="wrap">
  <div class="sidebar">
    <div class="sidebar-title">부서</div>
    <div id="deptList"></div>
  </div>
  <div class="main">
    <div class="main-top">
      <h2 id="deptName">전체</h2>
      <p id="deptCount"></p>
    </div>
    <div id="rowList"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<script>
const deptColors = {
  "부사장실":["#EEEDFE","#534AB7"],
  "QA/QC":  ["#E1F5EE","#0F6E56"],
  "공정설계":["#E6F1FB","#185FA5"],
  "배관설계":["#FAEEDA","#854F0B"],
  "기계설계":["#FAECE7","#993C1D"],
  "계장설계":["#FBEAF0","#993556"],
  "사업팀":  ["#EAF3DE","#3B6D11"],
  "전기설계":["#FCEBEB","#A32D2D"],
  "건축설계":["#F1EFE8","#5F5E5A"],
  "장치설계":["#EEEDFE","#3C3489"],
  "토목설계":["#E1F5EE","#085041"],
};

const statusPool = [
  {color:"#1D9E75",label:"온라인"},
  {color:"#1D9E75",label:"온라인"},
  {color:"#1D9E75",label:"온라인"},
  {color:"#BA7517",label:"자리비움"},
  {color:"#888780",label:"오프라인"},
];

let members = [];
let memberStatus = {};
let active = "전체";

fetch("members.json")
  .then(r => r.json())
  .then(data => {
    members = data;
    members.forEach(m => {
      memberStatus[m.name] = statusPool[Math.floor(Math.random()*statusPool.length)];
    });
    renderSidebar();
    renderRows("전체");
  })
  .catch(() => {
    document.getElementById("rowList").innerHTML = '<div class="error">members.json 파일을 불러올 수 없습니다.</div>';
  });

function getDepts(){
  const set = new Set(members.map(m=>m.dept));
  return ["전체",...Object.keys(deptColors).filter(d=>set.has(d))];
}

function renderSidebar(){
  document.getElementById("deptList").innerHTML = getDepts().map(d=>{
    const color = d==="전체"?"#888780":(deptColors[d]?deptColors[d][1]:"#888780");
    return `<div class="dept-item${d===active?" active":""}" onclick="select('${d}')">
      <div class="dept-dot" style="background:${color}"></div>${d}
    </div>`;
  }).join("");
}

function renderRows(dept){
  const list = dept==="전체" ? members : members.filter(m=>m.dept===dept);
  document.getElementById("deptName").textContent = dept;
  document.getElementById("deptCount").textContent = `${list.length}명`;
  document.getElementById("rowList").innerHTML = list.map(m=>{
    const c = deptColors[m.dept]||["#F1EFE8","#5F5E5A"];
    const st = memberStatus[m.name]||statusPool[0];
    const isSpecial = m.rank !== "프로";
    return `<div class="row">
      <div class="avatar" style="background:${c[0]};color:${c[1]}">${m.name.slice(0,2)}</div>
      <div class="name">${m.name}</div>
      <div class="dept-tag">${m.dept}</div>
      <div class="status-wrap">
        <div class="status-dot" style="background:${st.color}"></div>
        <span class="status-txt">${st.label}</span>
      </div>
      <div class="email">${m.email}</div>
      ${isSpecial?`<span class="badge" style="background:${c[0]};color:${c[1]}">${m.rank}</span>`:`<span style="min-width:36px"></span>`}
    </div>`;
  }).join("");
}

function select(dept){
  active=dept;
  renderSidebar();
  renderRows(dept);
}
</script>
</body>
</html>
